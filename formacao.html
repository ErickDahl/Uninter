<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formação acadêmica, cursos e idiomas de Erick Dahl."
    />
    <meta name="author" content="Erick Dahl" />
    <title>Erick Dahl | Formação</title>
    <link rel="stylesheet" href="css/estilo.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💻</text></svg>"
    />
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
  </head>
  <body>
    <!-- Reusable header component, defined in js/header.js -->
    <site-header></site-header>

    <main>
      <section class="section container">
        <h1 class="page-title">Formação</h1>
        <p class="intro">
          Minha trajetória de aprendizado, formação acadêmica e idiomas.
        </p>
      </section>

      <section class="section container">
        <h2 class="section-title">Educação</h2>
        <div class="timeline">
          <div class="timeline-item">
            <span class="period">2021 — 2023</span>
            <h3>Jogos Digitais</h3>
            <p class="institution">Melies</p>
            <p>Graduação em desenvolvimento de jogos digitais.</p>
          </div>
        </div>
      </section>

      <section class="section container">
        <h2 class="section-title">Idiomas</h2>
        <div class="languages-grid">
          <div class="language">
            <div class="language-header">
              <span>Português</span><span>Nativo</span>
            </div>
            <div class="bar">
              <div class="bar-fill" style="width: 100%"></div>
            </div>
          </div>
          <div class="language">
            <div class="language-header">
              <span>Inglês</span><span>Avançado</span>
            </div>
            <div class="bar">
              <div class="bar-fill" style="width: 65%"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Reusable footer component, defined in js/footer.js -->
    <site-footer></site-footer>

    <script src="js/script.js"></script>
  </body>
</html>
